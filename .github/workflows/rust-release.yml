name: rust-release-recovery

on:
  workflow_call:
    inputs:
      version:
        description: "Rust crate version to publish"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Rust crate version to recover"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Checkout release commit
        id: version
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="$RELEASE_VERSION_INPUT"
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "version must be canonical major.minor.patch" >&2
            exit 2
          fi
          git fetch --force origin "refs/tags/flowersec-rust/v${VERSION}:refs/tags/flowersec-rust/v${VERSION}"
          git checkout --detach "refs/tags/flowersec-rust/v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Validate release version facts
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: node scripts/check-release-version-consistency.mjs "$RELEASE_VERSION"

      - name: Verify release tags
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: scripts/verify-release-tags.sh "$RELEASE_VERSION" "$(git rev-parse HEAD)"

      - name: Check whether version is already published
        id: published
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          URL="https://crates.io/api/v1/crates/flowersec/${RELEASE_VERSION}"
          STATUS="$(curl --silent --show-error --location \
            --user-agent "flowersec-release-recovery/${RELEASE_VERSION} (https://github.com/floegence/flowersec)" \
            --output /dev/null --write-out '%{http_code}' "$URL")"
          case "$STATUS" in
            200) echo "exists=true" >> "$GITHUB_OUTPUT" ;;
            404) echo "exists=false" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected crates.io response status: $STATUS" >&2; exit 1 ;;
          esac

      - name: Authenticate to crates.io
        if: steps.published.outputs.exists != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1

      - name: Publish crate
        if: steps.published.outputs.exists != 'true'
        working-directory: flowersec-rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --no-verify
