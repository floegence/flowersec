name: rust-release

on:
  push:
    tags:
      - "flowersec-rust/v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust MSRV
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy,rustfmt,llvm-tools-preview

      - name: Install Rust quality tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny,cargo-llvm-cov,cargo-semver-checks

      - name: Validate tag and crate version
        id: version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#flowersec-rust/v}"
          CRATE_VERSION="$(sed -n 's/^version = "\([^"]*\)"/\1/p' flowersec-rust/Cargo.toml | head -1)"
          if [[ "$VERSION" != "$CRATE_VERSION" ]]; then
            echo "Tag version $VERSION must match crate version $CRATE_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify all language tags point to this commit
        run: scripts/verify-release-tags.sh "${{ steps.version.outputs.version }}" "${GITHUB_SHA}"

      - name: Run Rust release gate
        run: make rust-release-check

      - name: Verify package and downstream install
        run: |
          set -euo pipefail
          cd flowersec-rust
          cargo publish --dry-run
          cargo package
          mkdir -p "${RUNNER_TEMP}/flowersec-package" "${RUNNER_TEMP}/flowersec-consumer/src"
          tar -xzf "target/package/flowersec-${{ steps.version.outputs.version }}.crate" \
            -C "${RUNNER_TEMP}/flowersec-package"
          cat > "${RUNNER_TEMP}/flowersec-consumer/Cargo.toml" <<EOF
          [package]
          name = "flowersec-install-check"
          version = "0.0.0"
          edition = "2024"

          [dependencies]
          flowersec = { path = "${RUNNER_TEMP}/flowersec-package/flowersec-${{ steps.version.outputs.version }}" }
          EOF
          echo 'fn main() { let _ = flowersec::connect; }' \
            > "${RUNNER_TEMP}/flowersec-consumer/src/main.rs"
          cargo check --manifest-path "${RUNNER_TEMP}/flowersec-consumer/Cargo.toml"

      - name: Check whether version is already published
        id: published
        run: |
          set -euo pipefail
          if curl --fail --silent --show-error \
            "https://crates.io/api/v1/crates/flowersec/${{ steps.version.outputs.version }}" \
            >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to crates.io with OIDC
        if: steps.published.outputs.exists != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        if: steps.published.outputs.exists != 'true'
        working-directory: flowersec-rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish
