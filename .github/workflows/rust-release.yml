name: rust-release-recovery

on:
  workflow_call:
    inputs:
      version:
        description: "Rust crate version to publish"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Rust crate version to recover"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout release commit
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          git fetch --force origin "refs/tags/flowersec-rust/v${VERSION}:refs/tags/flowersec-rust/v${VERSION}"
          git checkout --detach "refs/tags/flowersec-rust/v${VERSION}"
          CRATE_VERSION="$(sed -n 's/^version = "\([^"]*\)"/\1/p' flowersec-rust/Cargo.toml | head -1)"
          if [[ "$VERSION" != "$CRATE_VERSION" ]]; then
            echo "Tag version $VERSION must match crate version $CRATE_VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify release tags
        run: scripts/verify-release-tags.sh "${{ steps.version.outputs.version }}" "$(git rev-parse HEAD)"

      - name: Check whether version is already published
        id: published
        run: |
          set -euo pipefail
          URL="https://crates.io/api/v1/crates/flowersec/${{ steps.version.outputs.version }}"
          STATUS="$(curl --silent --show-error --location \
            --user-agent "flowersec-release-recovery/${{ steps.version.outputs.version }} (https://github.com/floegence/flowersec)" \
            --output /dev/null --write-out '%{http_code}' "$URL")"
          case "$STATUS" in
            200) echo "exists=true" >> "$GITHUB_OUTPUT" ;;
            404) echo "exists=false" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected crates.io response status: $STATUS" >&2; exit 1 ;;
          esac

      - name: Setup Rust
        if: steps.published.outputs.exists != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io
        if: steps.published.outputs.exists != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        if: steps.published.outputs.exists != 'true'
        working-directory: flowersec-rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --no-verify
