name: release

on:
  push:
    tags:
      - "flowersec-go/v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#flowersec-go/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  rust-publish:
    needs: prepare
    uses: ./.github/workflows/rust-release.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  release:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Compute version vars
        id: vars
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#flowersec-go/v}"
          DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: flowersec-go/go.mod
          cache: true
          cache-dependency-path: flowersec-go/go.sum

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: flowersec-ts/package-lock.json

      - name: Ensure npm supports trusted publishing (OIDC)
        run: |
          set -euo pipefail
          npx -y npm@11.5.1 --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Validate release version facts
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
        run: node scripts/check-release-version-consistency.mjs "$RELEASE_VERSION"

      - name: Verify all language tags point to this commit
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
        run: scripts/verify-release-tags.sh "$RELEASE_VERSION" "$GITHUB_SHA"

      - name: Build release artifacts
        env:
          RELEASE_DATE: ${{ steps.vars.outputs.date }}
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          VERSION="$RELEASE_VERSION"
          COMMIT="$GITHUB_SHA"
          DATE="$RELEASE_DATE"

          mkdir -p dist

          # Build and pack the TypeScript SDK artifact.
          ( cd flowersec-ts && \
            npm ci --audit=false && \
            npm run build \
          )

          # Pack the TypeScript npm tarball for no-clone installs (from GitHub Releases).
          # This does not publish to npm; it only produces a .tgz artifact.
          ( cd flowersec-ts && \
            npm pack --silent && \
            mv "floegence-flowersec-core-${VERSION}.tgz" "../dist/" \
          )

          build_runtime() {
            local os="$1"
            local arch="$2"
            local dir="flowersec-runtime_${VERSION}_${os}_${arch}"
            rm -rf "$dir"
            mkdir -p "$dir"

            ( cd flowersec-go && \
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath \
                -ldflags "-s -w -X main.version=v${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
                -o "../$dir/flowersec-runtime" ./cmd/flowersec-runtime \
            )

            cp LICENSE "$dir/"
            scripts/stage-release-compliance.sh runtime "$dir"
            tar -C "$dir" -czf "dist/${dir}.tar.gz" .
          }

          build_runtime linux amd64
          build_runtime linux arm64

          ( cd dist && sha256sum * > checksums.txt )

      - name: Generate release notes
        env:
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          set -euo pipefail
          go run ./tools/releasenotes \
            --current-tag "$RELEASE_TAG" \
            --current-ref "${GITHUB_SHA}" \
            --output release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*
          body_path: release-notes.md

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/flowersec-runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flowersec-runtime:${{ steps.vars.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/flowersec-runtime:latest
          build-args: |
            VERSION=v${{ steps.vars.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.vars.outputs.date }}

      - name: Publish npm package
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          VERSION="$RELEASE_VERSION"
          PKG="@floegence/flowersec-core"

          # Make reruns safe: if the version is already published, do nothing.
          if npm view "${PKG}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PKG}@${VERSION} already published; skipping"
            exit 0
          fi

          ( cd flowersec-ts && npx -y npm@11.5.1 publish --access public )
