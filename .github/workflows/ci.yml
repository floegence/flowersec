name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: flowersec-go/go.mod
          cache: true
          cache-dependency-path: |
            flowersec-go/go.sum
            examples/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: flowersec-ts/package-lock.json

      - name: Run make check (stability + coverage included)
        run: make check
