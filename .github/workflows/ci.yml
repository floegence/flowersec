name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: flowersec-go/go.mod
          cache: true
          cache-dependency-path: |
            flowersec-go/go.sum
            examples/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: flowersec-ts/package-lock.json

      - name: Setup Rust MSRV
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy,rustfmt,llvm-tools-preview

      - name: Install stable Rust for semver checks
        run: rustup toolchain install stable --profile minimal

      - name: Install Rust quality tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny,cargo-llvm-cov,cargo-semver-checks

      - name: Run make check (stability + coverage included)
        run: make check

      - name: Run Rust and TypeScript pairwise interop
        run: make pairwise-interop

  swift-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: flowersec-go/go.mod
          cache: true
          cache-dependency-path: |
            flowersec-go/go.sum
            examples/go.sum

      - name: Setup Rust MSRV
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy,rustfmt,llvm-tools-preview

      - name: Run Swift package checks
        run: |
          set -euo pipefail
          make stability-check
          make swift-check
          make swift-rust-interop
