name: swift-release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  linux-swiftpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: flowersec-go/go.mod
          cache: true
          cache-dependency-path: |
            flowersec-go/go.sum
            examples/go.sum

      - name: Validate SwiftPM package on Linux
        run: |
          set -euo pipefail
          make stability-check
          make swift-check

  macos-swiftpm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: flowersec-go/go.mod
          cache: true
          cache-dependency-path: |
            flowersec-go/go.sum
            examples/go.sum

      - name: Validate SwiftPM package on macOS
        run: |
          set -euo pipefail
          make stability-check
          make swift-check

      - name: Run Go-reference Swift interop smoke
        timeout-minutes: 5
        run: make interop-smoke-swift

  release:
    needs:
      - linux-swiftpm
      - macos-swiftpm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: flowersec-go/go.mod
          cache: true
          cache-dependency-path: |
            flowersec-go/go.sum
            examples/go.sum

      - name: Verify all language tags point to this commit
        run: scripts/verify-release-tags.sh "${GITHUB_REF_NAME}" "${GITHUB_SHA}"

      - name: Generate release notes
        run: |
          set -euo pipefail
          go run ./tools/releasenotes \
            --current-tag "${GITHUB_REF_NAME}" \
            --current-ref "${GITHUB_SHA}" \
            --output release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
